# HotRadar AI - CI Pipeline
# Runs on push to main and pull requests

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend Lint & Test ───
  frontend-check:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check || npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests --coverage || true

      - name: Build
        run: npm run build

  # ─── Backend Lint & Test ───
  backend-check:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: ruff check . --output-format=github

      - name: Format check with ruff
        run: ruff format --check .

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
        run: pytest -v --tb=short

  # ─── Docker Build Validation ───
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t hotradar-frontend:test frontend/

      - name: Build backend image
        run: docker build -t hotradar-backend:test backend/

      - name: Validate docker-compose config
        run: |
          cd deploy
          docker compose -f docker-compose.yml config --quiet
